version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Shared Airflow environment variables
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
  AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  MLFLOW_TRACKING_URI: http://mlflow-server:5000

x-airflow-common-volumes: &airflow-common-volumes
  - ./pipeline/airflow/dags:/opt/airflow/dags
  - ./data:/opt/airflow/data
  - airflow_logs:/opt/airflow/logs

x-airflow-common-depends: &airflow-common-depends
  airflow-init:
    condition: service_completed_successfully

services:

  # ───────────────────────────────────────────
  # 1. MLflow Tracking Server + Model Registry
  # ───────────────────────────────────────────
  mlflow-server:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    container_name: mlflow-server
    working_dir: /mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
      - ./mlartifacts:/mlflow/artifacts
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ───────────────────────────────────────────
  # 2. PostgreSQL — Airflow metadata DB
  # ───────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # ───────────────────────────────────────────
  # 3. Redis — Celery broker
  # ───────────────────────────────────────────
  redis:
    image: redis:7.2-bookworm
    container_name: redis
    expose:
      - 6379
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s

  # ───────────────────────────────────────────
  # 4. Airflow Init — runs once to set up DB and admin user
  # ───────────────────────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: pipeline/airflow/Dockerfile

    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mlops-net

  # ───────────────────────────────────────────
  # 5. Airflow Webserver
  # ───────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: pipeline/airflow/Dockerfile
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    depends_on:
      <<: *airflow-common-depends
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ───────────────────────────────────────────
  # 6. Airflow Scheduler
  # ───────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: pipeline/airflow/Dockerfile
    container_name: airflow-scheduler
    command: scheduler
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    depends_on:
      <<: *airflow-common-depends
    networks:
      - mlops-net

  # ───────────────────────────────────────────
  # 7. Airflow Worker
  # ───────────────────────────────────────────
  airflow-worker:
    build:
      context: .
      dockerfile: pipeline/airflow/Dockerfile
    container_name: airflow-worker
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    volumes: *airflow-common-volumes
    depends_on:
      <<: *airflow-common-depends
    networks:
      - mlops-net

  # ───────────────────────────────────────────
  # 8. FastAPI Backend
  # ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      MODEL_NAME: insurance_cost_model
      MODEL_STAGE: Production
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlartifacts:/mlflow/artifacts
    networks:
      - mlops-net
    depends_on:
      mlflow-server:
        condition: service_started
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ───────────────────────────────────────────
  # 9. React Frontend
  # ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_GRAFANA_URL: http://localhost:3001
      REACT_APP_MLFLOW_URL: http://localhost:5000
      REACT_APP_AIRFLOW_URL: http://localhost:8081
    ports:
      - "3000:80"
    networks:
      - mlops-net
    depends_on:
      - backend

  # ───────────────────────────────────────────
  # 10. Prometheus
  # ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - mlops-net
    depends_on:
      - backend

  # ───────────────────────────────────────────
  # 11. Grafana
  # ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - mlops-net
    depends_on:
      - prometheus

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mlflow_data:
  airflow_logs:
  postgres_data:
  prometheus_data:
  grafana_data:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  mlops-net:
    driver: bridge