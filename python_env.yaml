# python_env.yaml
# MLflow uses this to create the isolated training environment.
# This is separate from the project venv (requirements.txt).

python: "3.10"

# Build dependencies (installed before pip packages)
build_dependencies:
  - pip

# Runtime dependencies for ML pipeline stages only
dependencies:
  - numpy==1.26.4
  - pandas==2.2.2
  - scikit-learn==1.4.2
  - xgboost==2.0.3
  - shap==0.45.0
  - mlflow==2.13.0
  - pyyaml==6.0.1
  - joblib==1.4.2
  - scipy==1.13.0
